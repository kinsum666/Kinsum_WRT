name: Build JDC
run-name: Build - ${{ inputs.model }}

on:
  workflow_dispatch:
    inputs:
      model:
        required: true
        description: Device Model
        type: choice
        default: jdcloud_ipq60xx_immwrt
        options:
          - cmcc_rax3000m_immwrt
          - jdcloud_ax6000_immwrt
          - jdcloud_ipq60xx_immwrt
          - jdcloud_ipq60xx_libwrt

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix
          sudo -E apt -yqq install libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV

      - name: Pre Clone
        run: ./wrt_core/pre_clone_action.sh ${{ inputs.model }}

      # ========== 自定义默认配置 ==========
      - name: Customize Default Settings
        run: |
          echo "=== 开始自定义系统默认配置 ==="
          
          # 1. 修改默认 LAN IP 为 192.168.188.1，并设置子网掩码
          CONFIG_GEN=$(find . -type f -path "*/package/base-files/files/bin/config_generate" 2>/dev/null | head -1)
          if [ -n "$CONFIG_GEN" ]; then
            # 替换 IP 地址
            sed -i 's/192.168.1.1/192.168.188.1/g' "$CONFIG_GEN"
            echo "已修改 LAN IP 为 192.168.188.1"
            # 添加子网掩码设置（在设置 ipaddr 的行后添加 netmask）
            sed -i '/set network.\$1.ipaddr=/a\            set network.\$1.netmask='\''255.255.255.0'\''' "$CONFIG_GEN"
            echo "已添加子网掩码 255.255.255.0"
          else
            echo "警告：未找到 config_generate 文件，跳过网络配置修改"
          fi
          
          # 2. 设置 root 密码为 erlang
          PWD_HASH=$(openssl passwd -1 "erlang")
          echo "生成的 root 密码哈希: $PWD_HASH"
          SHADOW_FILE=$(find . -type f -path "*/package/base-files/files/etc/shadow" 2>/dev/null | head -1)
          if [ -n "$SHADOW_FILE" ]; then
            if grep -q "^root:" "$SHADOW_FILE"; then
              sed -i "s|^root:[^:]*|root:${PWD_HASH}|" "$SHADOW_FILE"
            else
              echo "root:${PWD_HASH}:0:0:99999:7:::" >> "$SHADOW_FILE"
            fi
            echo "已修改 shadow 文件"
          else
            mkdir -p ./package/base-files/files/etc
            echo "root:${PWD_HASH}:0:0:99999:7:::" > ./package/base-files/files/etc/shadow
            echo "已创建 shadow 文件并设置密码"
          fi
          
          # 3. 配置默认 WiFi（SSID: Titok, 密码: yunding888）
          # 查找源码根目录（包含 package/Makefile 的目录）
          SOURCE_ROOT=$(find . -maxdepth 2 -type f -name "Makefile" -path "*/package/Makefile" -exec dirname {} \; | head -1)
          if [ -z "$SOURCE_ROOT" ]; then
            SOURCE_ROOT="./action_build"  # 备选路径
          fi
          echo "源码根目录: $SOURCE_ROOT"
          
          # 创建 files 目录结构
          mkdir -p "$SOURCE_ROOT/files/etc/config"
          
          # 生成 wireless 配置文件（兼容多数设备）
          cat > "$SOURCE_ROOT/files/etc/config/wireless" << 'EOF'
config wifi-device 'radio0'
        option type 'mac80211'
        option channel 'auto'
        option hwmode '11g'
        option path 'platform/soc/a000000.wifi'
        option htmode 'HT20'
        option disabled '0'

config wifi-iface 'default_radio0'
        option device 'radio0'
        option network 'lan'
        option mode 'ap'
        option ssid 'Titok'
        option encryption 'psk2'
        option key 'yunding888'

config wifi-device 'radio1'
        option type 'mac80211'
        option channel 'auto'
        option hwmode '11a'
        option path 'platform/soc/a800000.wifi'
        option htmode 'VHT80'
        option disabled '0'

config wifi-iface 'default_radio1'
        option device 'radio1'
        option network 'lan'
        option mode 'ap'
        option ssid 'Titok'
        option encryption 'psk2'
        option key 'yunding888'
EOF
          echo "已生成默认无线配置 (SSID: Titok, 密码: yunding888)"
          
          # 可选：若设备只有单频，上面的配置会自动适配，不会报错
          echo "=== 自定义配置完成 ==="
      # =================================

      - name: Cache Dependencies
        uses: actions/cache@v5.0.2
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Machine Information (Pre-build)
        run: |
          echo "=============== Pre-build Snapshot ==============="
          echo "Time: $(date '+%F %T %Z')"
          echo "Runner: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "Kernel: $(uname -r)"
          echo "Uptime: $(uptime -p)"
          echo "=================================================="
          echo "[CPU]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "=================================================="
          echo "[Memory]"
          free -h
          echo "=================================================="
          echo "[Disk]"
          df -hT
          echo "--------------------------------------------------"
          df -hi
          echo "=================================================="
          echo "[Workspace]"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          du -sh "${GITHUB_WORKSPACE}" 2>/dev/null || true
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          echo "=================================================="

      - name: Build Firmware
        run: ./build.sh ${{ inputs.model }}

      - name: Package per device
        run: |
          mkdir -p ./per_device_packages
          for file in ./firmware/*; do
            if [ -f "$file" ]; then
              device=$(basename "$file" | grep -oP '(?<=ipq60xx-generic-)[a-zA-Z0-9_]+(?=-squashfs)')
              if [ -z "$device" ]; then
                device=$(basename "$file" | cut -d'-' -f3)
              fi
              if [ -n "$device" ]; then
                mkdir -p "./tmp_pkg/$device"
                cp "$file" "./tmp_pkg/$device/"
              fi
            fi
          done
          if [ -d "./tmp_pkg" ]; then
            for dev_dir in ./tmp_pkg/*; do
              if [ -d "$dev_dir" ]; then
                dev_name=$(basename "$dev_dir")
                zip -r "./per_device_packages/${dev_name}.zip" "$dev_dir" -x "*.DS_Store"
              fi
            done
            rm -rf ./tmp_pkg
          else
            zip -r "./per_device_packages/firmware.zip" ./firmware
          fi

      - name: Delete Old Cache
        run: |
          gh cache list --key ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}- --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key"
          done
          echo "========cache status========"
          echo "ccache: $(du -sh ./action_build/.ccache | cut -f 1)"
          echo "staging: $(du -sh ./action_build/staging_dir | cut -f 1)"

      - name: Machine Information (Post-build)
        run: |
          echo "=============== Post-build Snapshot ==============="
          echo "Time: $(date '+%F %T %Z')"
          echo "Runner: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "Kernel: $(uname -r)"
          echo "Uptime: $(uptime -p)"
          echo "===================================================="
          echo "[CPU]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "===================================================="
          echo "[Memory]"
          free -h
          echo "===================================================="
          echo "[Disk]"
          df -hT
          echo "----------------------------------------------------"
          df -hi
          echo "===================================================="
          echo "[Build Outputs]"
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          du -sh ./per_device_packages 2>/dev/null || true
          echo "===================================================="

      - name: Upload Firmware (per device zip)
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BUILD_DATE }}_${{ inputs.model }}
          path: ./per_device_packages/*.zip
